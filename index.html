<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#F5F5F7;-webkit-font-smoothing:antialiased}
#root{height:100%}

/* SPLASH */
#splash{position:fixed;inset:0;background:#FF4D00;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s ease}
#splash.hide{opacity:0;pointer-events:none}
.splash-icon{width:80px;height:80px;background:rgba(255,255,255,.2);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin-bottom:16px;animation:splash-pop .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes splash-pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.splash-name{font-weight:800;font-size:1.8rem;color:#fff;letter-spacing:-.5px}
.splash-sub{color:rgba(255,255,255,.6);font-size:.82rem;margin-top:4px}
.splash-dots{display:flex;gap:5px;margin-top:24px}
.splash-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);animation:dp 1.2s ease-in-out infinite}
.splash-dots span:nth-child(2){animation-delay:.2s}
.splash-dots span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* INSTALL BANNER */
#install-banner{position:fixed;bottom:0;left:0;right:0;background:#1C1C1E;border-radius:20px 20px 0 0;padding:16px 18px 24px;display:flex;align-items:center;gap:12px;z-index:200;transform:translateY(100%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
#install-banner.show{transform:translateY(0)}
#install-banner img{width:44px;height:44px;border-radius:12px}
.ib-t{font-weight:700;color:#fff;font-size:.9rem}
.ib-s{color:#636366;font-size:.74rem;margin-top:2px}
.ib-btn{background:#FF4D00;color:#fff;border:none;padding:9px 18px;border-radius:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;margin-left:auto;white-space:nowrap}
.ib-x{background:none;border:none;color:#636366;cursor:pointer;font-size:1.1rem;padding:4px;line-height:1}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .28s ease both}
.scale-in{animation:scaleIn .22s ease both}
input:focus,select:focus,textarea:focus{outline:none;border-color:#FF4D00!important;box-shadow:0 0 0 3px rgba(255,77,0,.12)}
::-webkit-scrollbar{display:none}
</style>
</head>

<div id="splash">
  <div class="splash-icon">🏠</div>
  <div class="splash-name">Piedad 17</div>
  <div class="splash-sub">Inventario del hogar</div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="install-banner">
  <img src="icon-192.png" alt=""/>
  <div style="flex:1">
    <div class="ib-t">Instalar Piedad 17</div>
    <div class="ib-s">Agrega el app a tu pantalla de inicio</div>
  </div>
  <button class="ib-btn" id="install-btn">Instalar</button>
  <button class="ib-x" id="install-close">✕</button>
</div>

<div id="root"></div>

    databaseURL:       "https://lista-de-la-compra-6d49f-default-rtdb.europe-west1.firebasedatabase.app",

    storageBucket:     "lista-de-la-compra-6d49f.firebasestorage.app",

  };

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const CFG = window.FB_CONFIG || {};
const IS_READY = !!(CFG.apiKey && CFG.databaseURL);
let DB_REF = null;
if (IS_READY) {
  try {
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(CFG);
    DB_REF = firebase.database(app).ref('piedad17/items');
  } catch(e) { console.error(e); }
}

const CATS = [
  {id:'alimentos', label:'Alimentos',  emoji:'🥦', grad:['#22C55E','#16A34A'], bg:'#F0FDF4', light:'#DCFCE7', dark:'#16A34A'},
  {id:'bebidas',   label:'Bebidas',    emoji:'🥤', grad:['#38BDF8','#0284C7'], bg:'#F0F9FF', light:'#E0F2FE', dark:'#0284C7'},
  {id:'limpieza',  label:'Limpieza',   emoji:'🧹', grad:['#FB923C','#EA580C'], bg:'#FFF7ED', light:'#FED7AA', dark:'#EA580C'},
  {id:'higiene',   label:'Higiene',    emoji:'🧴', grad:['#C084FC','#9333EA'], bg:'#FAF5FF', light:'#E9D5FF', dark:'#9333EA'},
  {id:'panaderia', label:'Panadería',  emoji:'🍞', grad:['#F87171','#DC2626'], bg:'#FFF1F2', light:'#FFE4E6', dark:'#DC2626'},
  {id:'mascotas',  label:'Mascotas',   emoji:'🐾', grad:['#F472B6','#DB2777'], bg:'#FDF2F8', light:'#FCE7F3', dark:'#DB2777'},
  {id:'otros',     label:'Otros',      emoji:'📦', grad:['#94A3B8','#64748B'], bg:'#F8FAFC', light:'#F1F5F9', dark:'#64748B'},
];
const UNITS = ['un','kg','g','L','ml','cja','paq','doc','lata','sobre'];
const PET_TIPS = ['Alimento perro','Alimento gato','Arena gato','Antipulgas','Vitaminas','Golosinas','Shampoo','Pañales','Medicamentos','Juguetes'];
const gcat = id => CATS.find(c=>c.id===id) || CATS[6];
const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);

// SVG Icons
const Ico = ({n,s=18,c='currentColor'}) => {
  const p={width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:c,strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round'};
  return {
    home:  <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    cart:  <svg {...p}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>,
    paw:   <svg {...p}><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="7" cy="14" r="2"/><path d="M15 14a5 5 0 00-5.5-4.5 5 5 0 00-3.5 7.5l3 3a2 2 0 002.5.5l1-.5 1 .5a2 2 0 002.5-.5l1-1a5 5 0 00-2-5z"/></svg>,
    plus:  <svg {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>,
    check: <svg {...p} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
    trash: <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
    edit:  <svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>,
    share: <svg {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
    x:     <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    swap:  <svg {...p}><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>,
  }[n] || null;
};

function App() {
  const [tab, setTab]     = useState('home');
  const [items, setItems] = useState([]);
  const [online, setOnl]  = useState(true);
  const [syncing, setSyn] = useState(true);
  const [modal, setModal] = useState(false);
  const [form, setForm]   = useState({name:'',qty:'1',unit:'un',cat:'alimentos',status:'tengo'});
  const [editId, setEId]  = useState(null);
  const [fCat, setFCat]   = useState('all');
  const [fSt,  setFSt]    = useState('all');
  const [tips, setTips]   = useState(false);
  const [toast, setToast] = useState(null);
  const tRef = useRef(null);

  const showToast = (msg, ok=true) => {
    clearTimeout(tRef.current);
    setToast({msg, ok});
    tRef.current = setTimeout(()=>setToast(null), 2400);
  };

  useEffect(()=>{
    if(!DB_REF) return;
    const unsub = DB_REF.on('value', snap=>{
      const d = snap.val();
      setItems(d ? Object.values(d).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||'')) : []);
      setSyn(false);
      setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500);}},300);
    }, ()=>{setSyn(false);setOnl(false);});
    const cr = firebase.database().ref('.info/connected');
    cr.on('value', s=>setOnl(!!s.val()));
    return ()=>{DB_REF.off('value',unsub);cr.off();};
  },[]);

  const save = item => { if(DB_REF){setSyn(true);DB_REF.child(item.id).set(item);} };
  const del  = id   => { if(DB_REF){setSyn(true);DB_REF.child(id).remove();} };

  const openAdd = (catId=null) => {
    setEId(null);
    setForm({name:'',qty:'1',unit:'un',cat:catId||'alimentos',status:'tengo'});
    setModal(true);
  };
  const openEdit = item => {
    setEId(item.id);
    setForm({name:item.name,qty:String(item.qty),unit:item.unit,cat:item.cat,status:item.status});
    setModal(true);
  };
  const submit = () => {
    if(!form.name.trim()) return;
    save({id:editId||uid(),name:form.name.trim(),qty:Number(form.qty)||1,unit:form.unit,cat:form.cat,status:form.status,createdAt:editId?(items.find(i=>i.id===editId)||{}).createdAt||new Date().toISOString():new Date().toISOString(),updatedAt:new Date().toISOString()});
    setModal(false);
    showToast(editId?'Artículo actualizado':'Artículo agregado ✓');
  };
  const toggle = id => {
    const i=items.find(x=>x.id===id);
    if(i) save({...i,status:i.status==='tengo'?'comprar':'tengo',updatedAt:new Date().toISOString()});
  };
  const remove = id => { del(id); showToast('Artículo eliminado', false); };
  const bought = id => {
    const i=items.find(x=>x.id===id);
    if(i) save({...i,status:'tengo',updatedAt:new Date().toISOString()});
    showToast('¡Comprado! ✓');
  };
  const shareList = () => {
    const lines = items.filter(i=>i.status==='comprar').map(i=>`• ${i.name} (${i.qty} ${i.unit})`).join('\n');
    const text = `🏠 Piedad 17 — Lista de compras\n\n${lines}`;
    if(navigator.share) navigator.share({title:'Piedad 17',text});
    else navigator.clipboard.writeText(text).then(()=>showToast('Lista copiada 📋'));
  };

  const pend    = items.filter(i=>i.status==='comprar').length;
  const tendo   = items.filter(i=>i.status==='tengo').length;
  const petPend = items.filter(i=>i.cat==='mascotas'&&i.status==='comprar').length;
  const shown   = items.filter(i=>(fCat==='all'||i.cat===fCat)&&(fSt==='all'||i.status===fSt));
  const shopList= items.filter(i=>i.status==='comprar');
  const shopByCat=CATS.map(c=>({...c,its:shopList.filter(i=>i.cat===c.id)})).filter(c=>c.its.length);

  return (
    <div style={{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",minHeight:'100vh',background:'#F5F5F7',paddingBottom:80}}>

      {/* TOAST */}
      {toast&&(
        <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',background:toast.ok?'#1C1C1E':'#FF4D00',color:'#fff',padding:'10px 22px',borderRadius:50,fontWeight:700,fontSize:'.82rem',zIndex:9999,boxShadow:'0 8px 30px rgba(0,0,0,0.2)',whiteSpace:'nowrap',animation:'fadeUp .2s ease',pointerEvents:'none'}}>
          {toast.msg}
        </div>
      )}

      {/* ADD / EDIT MODAL */}
      {modal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:500,display:'flex',alignItems:'flex-end'}} onClick={e=>e.target===e.currentTarget&&setModal(false)}>
          <div className="fade-up" style={{background:'#fff',borderRadius:'24px 24px 0 0',padding:'8px 0 40px',width:'100%',maxHeight:'92vh',overflowY:'auto'}}>
            {/* Handle */}
            <div style={{width:40,height:4,borderRadius:2,background:'#E5E7EB',margin:'10px auto 20px'}}/>
            <div style={{padding:'0 20px'}}>
              <div style={{fontWeight:800,fontSize:'1.2rem',marginBottom:20,color:'#111'}}>{editId?'Editar artículo':'Nuevo artículo'}</div>

              {/* Name */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:'.75rem',fontWeight:700,color:'#9CA3AF',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Nombre</div>
                <input style={{width:'100%',padding:'13px 16px',borderRadius:14,border:'2px solid #F3F4F6',fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:'1rem',fontWeight:600,color:'#111',background:'#F9FAFB'}}
                  placeholder="Ej: Arroz, Leche, Jabón…" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
              </div>

              {/* Qty + Unit */}
              <div style={{display:'flex',gap:10,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:'.75rem',fontWeight:700,color:'#9CA3AF',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Cantidad</div>
                  <input style={{width:'100%',padding:'13px 16px',borderRadius:14,border:'2px solid #F3F4F6',fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:'1rem',fontWeight:600,color:'#111',background:'#F9FAFB'}}
                    type="number" min="0" step="0.1" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:'.75rem',fontWeight:700,color:'#9CA3AF',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Unidad</div>
                  <select style={{width:'100%',padding:'13px 16px',borderRadius:14,border:'2px solid #F3F4F6',fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:'1rem',fontWeight:600,color:'#111',background:'#F9FAFB',cursor:'pointer'}}
                    value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}>
                    {UNITS.map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
              </div>

              {/* Category */}
              <div style={{marginBottom:14}}>
                <div style={{fontSize:'.75rem',fontWeight:700,color:'#9CA3AF',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Categoría</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                  {CATS.map(c=>(
                    <button key={c.id} onClick={()=>setForm({...form,cat:c.id})}
                      style={{padding:'10px 6px',borderRadius:14,border:`2px solid ${form.cat===c.id?c.dark:'#F3F4F6'}`,background:form.cat===c.id?c.light:'#F9FAFB',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,transition:'all .15s'}}>
                      <span style={{fontSize:'1.3rem'}}>{c.emoji}</span>
                      <span style={{fontSize:'.64rem',fontWeight:700,color:form.cat===c.id?c.dark:'#9CA3AF'}}>{c.label}</span>
                    </button>
                  ))}
                </div>
              </div>

              {/* Status */}
              <div style={{marginBottom:22}}>
                <div style={{fontSize:'.75rem',fontWeight:700,color:'#9CA3AF',marginBottom:10,textTransform:'uppercase',letterSpacing:.5}}>Estado</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  {[{v:'tengo',label:'✅ Lo tengo',bg:'#F0FDF4',border:'#16A34A',color:'#16A34A'},{v:'comprar',label:'🛒 Por comprar',bg:'#FFF7ED',border:'#EA580C',color:'#EA580C'}].map(o=>(
                    <button key={o.v} onClick={()=>setForm({...form,status:o.v})}
                      style={{padding:'13px',borderRadius:14,border:`2px solid ${form.status===o.v?o.border:'#F3F4F6'}`,background:form.status===o.v?o.bg:'#F9FAFB',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.88rem',color:form.status===o.v?o.color:'#9CA3AF',cursor:'pointer',transition:'all .15s'}}>
                      {o.label}
                    </button>
                  ))}
                </div>
              </div>

              {/* Save btn */}
              <button onClick={submit}
                style={{width:'100%',padding:'16px',borderRadius:16,border:'none',background:'linear-gradient(135deg,#FF4D00,#FF7A00)',color:'#fff',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:800,fontSize:'1rem',cursor:'pointer',boxShadow:'0 4px 20px rgba(255,77,0,.35)',transition:'opacity .15s'}}>
                {editId?'Guardar cambios':'Agregar artículo'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── HOME ────────────────────────────────────────────────────────── */}
      {tab==='home'&&(
        <div className="fade-up">
          {/* Hero header */}
          <div style={{background:'linear-gradient(160deg,#FF4D00 0%,#FF7A00 100%)',padding:'max(env(safe-area-inset-top,0px),44px) 20px 28px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',width:250,height:250,borderRadius:'50%',background:'rgba(255,255,255,.08)',top:-80,right:-60,pointerEvents:'none'}}/>
            <div style={{position:'absolute',width:150,height:150,borderRadius:'50%',background:'rgba(255,255,255,.06)',bottom:-60,left:20,pointerEvents:'none'}}/>
            <div style={{position:'relative',zIndex:1}}>
              <div style={{color:'rgba(255,255,255,.7)',fontSize:'.78rem',fontWeight:600,marginBottom:4}}>Bienvenida 👋</div>
              <div style={{fontWeight:800,fontSize:'1.6rem',color:'#fff',letterSpacing:'-.5px',lineHeight:1.2}}>Piedad 17</div>
              <div style={{color:'rgba(255,255,255,.7)',fontSize:'.8rem',marginTop:4}}>Tu inventario del hogar</div>

              {/* Stats row */}
              <div style={{display:'flex',gap:10,marginTop:18}}>
                {[
                  {label:'En casa',value:tendo,icon:'✅'},
                  {label:'Por comprar',value:pend,icon:'🛒'},
                  {label:'Mascotas',value:items.filter(i=>i.cat==='mascotas').length,icon:'🐾'},
                ].map((s,i)=>(
                  <div key={i} style={{flex:1,background:'rgba(255,255,255,.15)',backdropFilter:'blur(10px)',borderRadius:14,padding:'10px 12px',textAlign:'center'}}>
                    <div style={{fontSize:'1.1rem',marginBottom:2}}>{s.icon}</div>
                    <div style={{fontWeight:800,fontSize:'1.1rem',color:'#fff'}}>{s.value}</div>
                    <div style={{fontSize:'.65rem',color:'rgba(255,255,255,.7)',fontWeight:600,marginTop:1}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          <div style={{padding:'20px 16px'}}>

            {/* Sync status */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:online?'#22C55E':'#EF4444',boxShadow:online?'0 0 0 3px rgba(34,197,94,.2)':undefined}}/>
                <span style={{fontSize:'.76rem',fontWeight:600,color:online?'#16A34A':'#EF4444'}}>{syncing?'Sincronizando…':online?'En línea':'Sin conexión'}</span>
              </div>
              <button onClick={()=>openAdd()} style={{display:'flex',alignItems:'center',gap:6,background:'#FF4D00',color:'#fff',border:'none',borderRadius:50,padding:'7px 16px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.8rem',cursor:'pointer',boxShadow:'0 4px 14px rgba(255,77,0,.3)'}}>
                <Ico n="plus" s={14} c="#fff"/> Agregar
              </button>
            </div>

            {/* Category grid */}
            <div style={{fontWeight:800,fontSize:'1rem',color:'#111',marginBottom:12}}>Categorías</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:24}}>
              {CATS.map(c=>{
                const count = items.filter(i=>i.cat===c.id).length;
                const pendC = items.filter(i=>i.cat===c.id&&i.status==='comprar').length;
                return (
                  <button key={c.id} onClick={()=>{setFCat(c.id);setFSt('all');setTab('list');}}
                    style={{background:`linear-gradient(135deg,${c.grad[0]},${c.grad[1]})`,border:'none',borderRadius:18,padding:'14px 8px',cursor:'pointer',position:'relative',transition:'transform .15s',boxShadow:`0 4px 14px ${c.grad[1]}40`}}
                    onMouseEnter={e=>e.currentTarget.style.transform='scale(1.04)'}
                    onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}>
                    {pendC>0&&<div style={{position:'absolute',top:6,right:6,width:16,height:16,borderRadius:'50%',background:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.62rem',fontWeight:800,color:c.dark}}>{pendC}</div>}
                    <div style={{fontSize:'1.5rem',marginBottom:5}}>{c.emoji}</div>
                    <div style={{fontSize:'.64rem',fontWeight:800,color:'rgba(255,255,255,.9)',lineHeight:1.2}}>{c.label}</div>
                    <div style={{fontSize:'.6rem',color:'rgba(255,255,255,.6)',marginTop:2}}>{count} ítem{count!==1?'s':''}</div>
                  </button>
                );
              })}
            </div>

            {/* Recent / needs buying */}
            {pend > 0 && (
              <>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                  <div style={{fontWeight:800,fontSize:'1rem',color:'#111'}}>Por comprar <span style={{background:'#FF4D00',color:'#fff',borderRadius:50,padding:'1px 8px',fontSize:'.72rem',marginLeft:4}}>{pend}</span></div>
                  <button onClick={()=>{setFSt('comprar');setFCat('all');setTab('list');}} style={{background:'none',border:'none',color:'#FF4D00',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>Ver todo →</button>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {items.filter(i=>i.status==='comprar').slice(0,4).map(item=>{
                    const c=gcat(item.cat);
                    return (
                      <div key={item.id} className="scale-in" style={{background:'#fff',borderRadius:16,padding:'13px 15px',display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 10px rgba(0,0,0,0.06)'}}>
                        <div style={{width:42,height:42,borderRadius:12,background:`linear-gradient(135deg,${c.grad[0]},${c.grad[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.2rem',flexShrink:0}}>{c.emoji}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontWeight:700,fontSize:'.92rem',color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                          <div style={{fontSize:'.74rem',color:'#9CA3AF',marginTop:1}}>{item.qty} {item.unit} · {c.label}</div>
                        </div>
                        <button onClick={()=>bought(item.id)} style={{width:34,height:34,border:'none',borderRadius:10,background:'#F0FDF4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                          <Ico n="check" s={15} c="#16A34A"/>
                        </button>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {items.length===0&&!syncing&&(
              <div style={{textAlign:'center',padding:'40px 20px',color:'#D1D5DB'}}>
                <div style={{fontSize:'3rem',marginBottom:12}}>🏠</div>
                <div style={{fontWeight:700,color:'#9CA3AF',fontSize:'.95rem'}}>Tu inventario está vacío</div>
                <div style={{fontSize:'.82rem',color:'#D1D5DB',marginTop:6}}>Toca "Agregar" para empezar</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── LIST ────────────────────────────────────────────────────────── */}
      {tab==='list'&&(
        <div className="fade-up">
          {/* Header */}
          <div style={{background:'#fff',padding:'max(env(safe-area-inset-top,0px),50px) 20px 16px',borderBottom:'1px solid #F3F4F6',position:'sticky',top:0,zIndex:50}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:'1.1rem',color:'#111'}}>Inventario</div>
              <button onClick={()=>openAdd()} style={{display:'flex',alignItems:'center',gap:5,background:'#FF4D00',color:'#fff',border:'none',borderRadius:50,padding:'7px 14px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>
                <Ico n="plus" s={13} c="#fff"/> Agregar
              </button>
            </div>
            {/* Filter chips */}
            <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:2}}>
              {[{id:'all',l:'Todos'},{id:'tengo',l:'✅ Tengo'},{id:'comprar',l:'🛒 Comprar'}].map(f=>(
                <button key={f.id} onClick={()=>setFSt(f.id)} style={{padding:'6px 14px',borderRadius:50,border:'none',background:fSt===f.id?'#FF4D00':'#F3F4F6',color:fSt===f.id?'#fff':'#6B7280',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.75rem',cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s'}}>{f.l}</button>
              ))}
              <div style={{width:1,background:'#E5E7EB',margin:'0 2px',flexShrink:0}}/>
              {[{id:'all',l:'Todas',e:''},...CATS.map(c=>({id:c.id,l:c.label,e:c.emoji}))].map(f=>(
                <button key={f.id} onClick={()=>setFCat(f.id)} style={{padding:'6px 14px',borderRadius:50,border:'none',background:fCat===f.id?'#111':'#F3F4F6',color:fCat===f.id?'#fff':'#6B7280',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.75rem',cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s'}}>{f.e&&f.e+' '}{f.l}</button>
              ))}
            </div>
          </div>

          <div style={{padding:'12px 16px'}}>
            {shown.length===0?(
              <div style={{textAlign:'center',padding:'60px 20px',color:'#D1D5DB'}}>
                <div style={{fontSize:'2.5rem',marginBottom:10}}>🗃️</div>
                <div style={{fontWeight:700,color:'#9CA3AF'}}>Sin artículos</div>
              </div>
            ):shown.map((item,i)=>{
              const c=gcat(item.cat);
              return (
                <div key={item.id} className="scale-in" style={{background:'#fff',borderRadius:18,padding:'14px 15px',marginBottom:10,display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 12px rgba(0,0,0,0.05)',animationDelay:`${i*0.03}s`,borderLeft:`4px solid ${item.status==='tengo'?c.dark:'#E5E7EB'}`}}>
                  <div style={{width:44,height:44,borderRadius:14,background:`linear-gradient(135deg,${c.grad[0]},${c.grad[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem',flexShrink:0,boxShadow:`0 4px 10px ${c.grad[1]}40`}}>{c.emoji}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:'.93rem',color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                    <div style={{fontSize:'.74rem',color:'#9CA3AF',marginTop:2,display:'flex',alignItems:'center',gap:6}}>
                      <span>{item.qty} {item.unit}</span>
                      <span style={{width:3,height:3,borderRadius:'50%',background:'#D1D5DB',display:'inline-block'}}/>
                      <span style={{color:item.status==='tengo'?c.dark:'#EA580C',fontWeight:700}}>{item.status==='tengo'?'En casa':'Por comprar'}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>toggle(item.id)} style={{width:32,height:32,border:'none',borderRadius:10,background:item.status==='tengo'?'#FFF7ED':'#F0FDF4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                      {item.status==='tengo'?<Ico n="cart" s={14} c="#EA580C"/>:<Ico n="check" s={14} c="#16A34A"/>}
                    </button>
                    <button onClick={()=>openEdit(item)} style={{width:32,height:32,border:'none',borderRadius:10,background:'#EFF6FF',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                      <Ico n="edit" s={14} c="#3B82F6"/>
                    </button>
                    <button onClick={()=>remove(item.id)} style={{width:32,height:32,border:'none',borderRadius:10,background:'#FFF1F2',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                      <Ico n="trash" s={14} c="#F43F5E"/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── COMPRAS ─────────────────────────────────────────────────────── */}
      {tab==='compras'&&(
        <div className="fade-up">
          <div style={{background:'#fff',padding:'max(env(safe-area-inset-top,0px),50px) 20px 16px',borderBottom:'1px solid #F3F4F6'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:800,fontSize:'1.1rem',color:'#111'}}>Lista de compras</div>
                <div style={{fontSize:'.76rem',color:'#9CA3AF',marginTop:2}}>{pend===0?'¡Todo en casa! 🎉':`${pend} artículo${pend!==1?'s':''} pendiente${pend!==1?'s':''}`}</div>
              </div>
              {pend>0&&<button onClick={shareList} style={{display:'flex',alignItems:'center',gap:5,background:'#F3F4F6',border:'none',borderRadius:50,padding:'8px 14px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',color:'#374151',cursor:'pointer'}}>
                <Ico n="share" s={13} c="#374151"/> Compartir
              </button>}
            </div>
          </div>

          <div style={{padding:'16px'}}>
            {shopByCat.length===0?(
              <div style={{textAlign:'center',padding:'60px 20px'}}>
                <div style={{fontSize:'4rem',marginBottom:12}}>🎉</div>
                <div style={{fontWeight:800,fontSize:'1.1rem',color:'#374151'}}>¡Inventario completo!</div>
                <div style={{fontSize:'.84rem',color:'#9CA3AF',marginTop:6}}>No hay artículos por comprar</div>
              </div>
            ):shopByCat.map(cat=>(
              <div key={cat.id} style={{background:'#fff',borderRadius:20,padding:'16px',marginBottom:12,boxShadow:'0 2px 12px rgba(0,0,0,0.05)'}}>
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:13}}>
                  <div style={{width:38,height:38,borderRadius:12,background:`linear-gradient(135deg,${cat.grad[0]},${cat.grad[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem',boxShadow:`0 3px 10px ${cat.grad[1]}40`}}>{cat.emoji}</div>
                  <div style={{flex:1,fontWeight:800,fontSize:'.95rem',color:'#111'}}>{cat.label}</div>
                  <div style={{background:cat.light,color:cat.dark,padding:'3px 10px',borderRadius:50,fontSize:'.72rem',fontWeight:700}}>{cat.its.length}</div>
                </div>
                {cat.its.map(item=>(
                  <div key={item.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #F9FAFB'}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,color:'#111',fontSize:'.9rem'}}>{item.name}</div>
                      <div style={{fontSize:'.74rem',color:'#9CA3AF',marginTop:1}}>{item.qty} {item.unit}</div>
                    </div>
                    <button onClick={()=>bought(item.id)} style={{display:'flex',alignItems:'center',gap:5,background:'linear-gradient(135deg,#22C55E,#16A34A)',color:'#fff',border:'none',borderRadius:50,padding:'7px 14px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.76rem',cursor:'pointer',boxShadow:'0 3px 10px rgba(22,163,74,.3)'}}>
                      <Ico n="check" s={12} c="#fff"/> Comprado
                    </button>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── MASCOTAS ────────────────────────────────────────────────────── */}
      {tab==='mascotas'&&(
        <div className="fade-up">
          {/* Hero */}
          <div style={{background:'linear-gradient(160deg,#DB2777,#9333EA)',padding:'max(env(safe-area-inset-top,0px),44px) 20px 28px',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',width:200,height:200,borderRadius:'50%',background:'rgba(255,255,255,.08)',top:-60,right:-50,pointerEvents:'none'}}/>
            <div style={{fontWeight:800,fontSize:'1.5rem',color:'#fff',letterSpacing:'-.5px'}}>Mascotas 🐾</div>
            <div style={{color:'rgba(255,255,255,.7)',fontSize:'.8rem',marginTop:4}}>Inventario de tus compañeros</div>
            <div style={{display:'flex',gap:10,marginTop:16}}>
              {[{l:'Total',v:items.filter(i=>i.cat==='mascotas').length},{l:'Disponible',v:items.filter(i=>i.cat==='mascotas'&&i.status==='tengo').length},{l:'Comprar',v:petPend}].map((s,i)=>(
                <div key={i} style={{flex:1,background:'rgba(255,255,255,.15)',backdropFilter:'blur(10px)',borderRadius:14,padding:'10px 12px',textAlign:'center'}}>
                  <div style={{fontWeight:800,fontSize:'1.1rem',color:'#fff'}}>{s.v}</div>
                  <div style={{fontSize:'.64rem',color:'rgba(255,255,255,.7)',fontWeight:600,marginTop:1}}>{s.l}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{padding:'16px'}}>
            {/* Quick tips */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontWeight:800,fontSize:'.95rem',color:'#111'}}>Agregar rápido</div>
              <button onClick={()=>openAdd('mascotas')} style={{display:'flex',alignItems:'center',gap:5,background:'linear-gradient(135deg,#DB2777,#9333EA)',color:'#fff',border:'none',borderRadius:50,padding:'7px 14px',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:700,fontSize:'.78rem',cursor:'pointer'}}>
                <Ico n="plus" s={13} c="#fff"/> Nuevo
              </button>
            </div>
            <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,marginBottom:18}}>
              {PET_TIPS.map(s=>(
                <button key={s} onClick={()=>{setForm({name:s,qty:'1',unit:'un',cat:'mascotas',status:'comprar'});setEId(null);setModal(true);}}
                  style={{padding:'8px 14px',borderRadius:50,border:'none',background:'#F3F4F6',color:'#374151',fontFamily:"'Plus Jakarta Sans',sans-serif",fontWeight:600,fontSize:'.76rem',cursor:'pointer',whiteSpace:'nowrap'}}>
                  {s}
                </button>
              ))}
            </div>

            {/* Items */}
            {items.filter(i=>i.cat==='mascotas').length===0?(
              <div style={{textAlign:'center',padding:'40px 20px',color:'#D1D5DB'}}>
                <div style={{fontSize:'3rem',marginBottom:10}}>🐶🐱</div>
                <div style={{fontWeight:700,color:'#9CA3AF',fontSize:'.95rem'}}>Sin artículos de mascotas</div>
              </div>
            ):items.filter(i=>i.cat==='mascotas').map(item=>(
              <div key={item.id} className="scale-in" style={{background:'#fff',borderRadius:18,padding:'14px 15px',marginBottom:10,display:'flex',alignItems:'center',gap:12,boxShadow:'0 2px 12px rgba(0,0,0,0.05)',borderLeft:'4px solid #DB2777'}}>
                <div style={{width:44,height:44,borderRadius:14,background:'linear-gradient(135deg,#F472B6,#DB2777)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem',flexShrink:0}}>🐾</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:700,fontSize:'.93rem',color:'#111',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                  <div style={{fontSize:'.74rem',color:'#9CA3AF',marginTop:2}}>
                    {item.qty} {item.unit} · <span style={{color:item.status==='tengo'?'#16A34A':'#DB2777',fontWeight:700}}>{item.status==='tengo'?'Disponible':'Por comprar'}</span>
                  </div>
                </div>
                <div style={{display:'flex',gap:6}}>
                  <button onClick={()=>toggle(item.id)} style={{width:32,height:32,border:'none',borderRadius:10,background:item.status==='tengo'?'#FDF2F8':'#F0FDF4',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                    {item.status==='tengo'?<Ico n="cart" s={14} c="#DB2777"/>:<Ico n="check" s={14} c="#16A34A"/>}
                  </button>
                  <button onClick={()=>openEdit(item)} style={{width:32,height:32,border:'none',borderRadius:10,background:'#EFF6FF',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                    <Ico n="edit" s={14} c="#3B82F6"/>
                  </button>
                  <button onClick={()=>remove(item.id)} style={{width:32,height:32,border:'none',borderRadius:10,background:'#FFF1F2',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>
                    <Ico n="trash" s={14} c="#F43F5E"/>
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── BOTTOM NAV ──────────────────────────────────────────────────── */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',borderTop:'1px solid rgba(0,0,0,0.06)',display:'flex',padding:`10px 0 max(env(safe-area-inset-bottom,0px),10px)`,zIndex:100,boxShadow:'0 -4px 20px rgba(0,0,0,0.06)'}}>
        {[
          {id:'home',   ico:'home',  label:'Inicio'},
          {id:'list',   ico:'swap',  label:'Inventario'},
          {id:'compras',ico:'cart',  label:'Compras',   badge:pend},
          {id:'mascotas',ico:'paw',  label:'Mascotas',  badge:petPend},
        ].map(({id,ico,label,badge})=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,border:'none',background:'none',cursor:'pointer',padding:'4px 0',position:'relative'}}>
            {badge>0&&<div style={{position:'absolute',top:0,right:'calc(50% - 16px)',width:16,height:16,borderRadius:'50%',background:'#FF4D00',color:'#fff',fontSize:'.6rem',fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center'}}>{badge}</div>}
            <div style={{width:32,height:32,borderRadius:10,background:tab===id?'#FF4D00':tab===id?'#FF4D00':'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',transform:tab===id?'scale(1.1)':'scale(1)'}}>
              <Ico n={ico} s={18} c={tab===id?'#fff':'#9CA3AF'}/>
            </div>
            <span style={{fontSize:'.62rem',fontWeight:700,color:tab===id?'#FF4D00':'#9CA3AF',transition:'color .2s'}}>{label}</span>
          </button>
        ))}
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
if(!IS_READY) setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500);}},400);
</script>

<script>
let deferredPrompt=null;
const banner=document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;setTimeout(()=>banner.classList.add('show'),5000);});
document.getElementById('install-btn').addEventListener('click',()=>{banner.classList.remove('show');if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}});
document.getElementById('install-close').addEventListener('click',()=>{banner.classList.remove('show');});
window.addEventListener('appinstalled',()=>banner.classList.remove('show'));
if('serviceWorker'in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
</script>
</body>
</html>
