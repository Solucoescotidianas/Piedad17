<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Piedad 17</title>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0F172A"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Piedad 17"/>

  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:'DM Sans',system-ui,sans-serif;background:#F8FAFC;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    #root{height:100%}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
    #splash{position:fixed;inset:0;background:#0F172A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
    #splash.hide{opacity:0;pointer-events:none}
    #splash-logo{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;color:#fff;letter-spacing:-1px}
    #splash-logo span{color:#0EA5E9}
    #splash-sub{color:#475569;font-size:.85rem;margin-top:8px}
    #splash-dots{display:flex;gap:6px;margin-top:28px}
    #splash-dots span{width:7px;height:7px;border-radius:50%;background:#0EA5E9;animation:dp 1.2s ease-in-out infinite}
    #splash-dots span:nth-child(2){animation-delay:.2s}
    #splash-dots span:nth-child(3){animation-delay:.4s}
    @keyframes dp{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
    #install-banner{position:fixed;bottom:0;left:0;right:0;background:#0F172A;border-top:1px solid #1E293B;padding:14px 18px;display:flex;align-items:center;gap:12px;z-index:200;transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
    #install-banner.show{transform:translateY(0)}
    #install-banner img{width:40px;height:40px;border-radius:10px}
    .ib-text{flex:1}
    .ib-title{font-weight:700;color:#fff;font-size:.9rem}
    .ib-sub{color:#64748B;font-size:.75rem;margin-top:1px}
    .ib-btn{background:#0EA5E9;color:#fff;border:none;padding:8px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer}
    .ib-close{background:none;border:none;color:#475569;cursor:pointer;padding:4px;font-size:1.2rem;line-height:1}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .fade-in{animation:fadeUp .25s ease both}
    .item-row{transition:transform .15s}
    .item-row:hover{transform:translateX(3px)}
    .icon-btn:hover{opacity:.7}
    .tag-btn{transition:all .15s}
    .main-btn{transition:all .15s!important}
    .main-btn:hover{opacity:.88;transform:translateY(-1px)}
    .main-btn:active{transform:translateY(0)!important}
    input:focus,select:focus,textarea:focus{border-color:#0EA5E9!important;box-shadow:0 0 0 3px rgba(14,165,233,.14);outline:none}
    .syncing{animation:pulse .9s ease infinite}
  </style>
</head>
<body>

<div id="splash">
  <div id="splash-logo">Piedad <span>17</span></div>
  <div id="splash-sub">Conectando…</div>
  <div id="splash-dots"><span></span><span></span><span></span></div>
</div>

<div id="install-banner">
  <img src="icon-192.png" alt=""/>
  <div class="ib-text">
    <div class="ib-title">Instalar Piedad 17</div>
    <div class="ib-sub">Acceso rápido desde tu pantalla de inicio</div>
  </div>
  <button class="ib-btn" id="install-btn">Instalar</button>
  <button class="ib-close" id="install-close">✕</button>
</div>

<div id="root"></div>

<script>
  // ╔══════════════════════════════════════════════════════════════════╗

  window.FB_CONFIG = {
    apiKey:            "AIzaSyCPANIk_qip_1FOprlzWGEZ2CYZlN3nZIc",
    authDomain:        "lista-de-la-compra-6d49f.firebaseapp.com",
    databaseURL:       "https://lista-de-la-compra-6d49f-default-rtdb.europe-west1.firebasedatabase.app",

    storageBucket:     "lista-de-la-compra-6d49f.firebasestorage.app",

</script>

<script type="text/babel" data-presets="react">
  const { useState, useEffect, useRef } = React;

  const CFG = window.FB_CONFIG || {};
  const IS_READY = !!(CFG.apiKey && CFG.databaseURL);

  let DB_REF = null;
  if (IS_READY) {
    try {
      const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(CFG);
      DB_REF = firebase.database(app).ref('piedad17/items');
    } catch(e) { console.error(e); }
  }

  const CATS = [
    {id:'alimentos',label:'Alimentos', emoji:'🥦',color:'#16A34A',bg:'#F0FDF4',light:'#DCFCE7'},
    {id:'bebidas',  label:'Bebidas',   emoji:'🥤',color:'#0284C7',bg:'#F0F9FF',light:'#E0F2FE'},
    {id:'limpieza', label:'Limpieza',  emoji:'🧹',color:'#D97706',bg:'#FFFBEB',light:'#FEF3C7'},
    {id:'higiene',  label:'Higiene',   emoji:'🧴',color:'#7C3AED',bg:'#F5F3FF',light:'#EDE9FE'},
    {id:'panaderia',label:'Panadería', emoji:'🍞',color:'#DC2626',bg:'#FFF1F2',light:'#FFE4E6'},
    {id:'mascotas', label:'Mascotas',  emoji:'🐾',color:'#C026D3',bg:'#FDF4FF',light:'#FAE8FF'},
    {id:'otros',    label:'Otros',     emoji:'📦',color:'#475569',bg:'#F8FAFC',light:'#F1F5F9'},
  ];
  const UNITS = ['un','kg','g','L','ml','cja','paq','doc','lata','sobre'];
  const PET_TIPS = ['Alimento para perro','Alimento para gato','Arena para gato','Antipulgas','Vitaminas','Golosinas','Shampoo','Pañales','Medicamentos','Collar','Correa','Juguetes'];
  const cat = id => CATS.find(c=>c.id===id) || CATS[6];
  const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);

  const Ico = ({n,s=16}) => {
    const p = {width:s,height:s,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round'};
    return {
      plus:   <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      trash:  <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>,
      check:  <svg {...p} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
      cart:   <svg {...p}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>,
      home:   <svg {...p}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
      paw:    <svg {...p}><circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/><circle cx="7" cy="14" r="2"/><path d="M15 14a5 5 0 00-5.5-4.5 5 5 0 00-3.5 7.5l3 3a2 2 0 002.5.5l1-.5 1 .5a2 2 0 002.5-.5l1-1a5 5 0 00-2-5z"/></svg>,
      edit:   <svg {...p}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>,
      share:  <svg {...p}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>,
      x:      <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    }[n] || null;
  };

  // ─── SETUP SCREEN ─────────────────────────────────────────────────────────
  function Setup() {
    return (
      <div style={{background:'#0F172A',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'30px 16px',fontFamily:"'DM Sans',sans-serif"}}>
        <div style={{maxWidth:480,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:28}}>
            <div style={{fontSize:'2.4rem',marginBottom:10}}>🔧</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:'1.6rem',color:'#fff'}}>
              Piedad <span style={{color:'#0EA5E9'}}>17</span>
            </div>
            <div style={{color:'#64748B',fontSize:'.88rem',marginTop:8,lineHeight:1.6}}>
              Conecta Firebase para sincronización<br/>automática en todos los dispositivos
            </div>
          </div>
          {[
            {n:1,icon:'🌐',title:'Crear proyecto Firebase',body:<>Entra en <a href="https://console.firebase.google.com" target="_blank" rel="noopener" style={{color:'#0EA5E9',textDecoration:'none'}}>console.firebase.google.com</a> → "Agregar proyecto" → sigue los pasos (2 min).</>},
            {n:2,icon:'🗄️',title:'Activar Realtime Database',body:<>Build → Realtime Database → "Create database" → elige <strong style={{color:'#fff'}}>"Start in test mode"</strong> → Done.</>},
            {n:3,icon:'⚙️',title:'Copiar las credenciales',body:<>Project Overview → ⚙️ Configuración del proyecto → "Tus apps" → &#60;/&#62; Web → Registra la app → copia el objeto <code style={{background:'#1E293B',padding:'1px 5px',borderRadius:4,color:'#38BDF8'}}>firebaseConfig</code>.</>},
            {n:4,icon:'📝',title:'Pegar en index.html',body:<>Abre <code style={{background:'#1E293B',padding:'1px 5px',borderRadius:4,color:'#38BDF8'}}>index.html</code> con cualquier editor de texto → busca <code style={{background:'#1E293B',padding:'1px 5px',borderRadius:4,color:'#38BDF8'}}>FB_CONFIG</code> → reemplaza los valores vacíos → guarda → sube a GitHub.</>},
          ].map(s=>(
            <div key={s.n} style={{background:'#1E293B',borderRadius:14,padding:'15px 17px',marginBottom:9,display:'flex',gap:13,alignItems:'flex-start'}}>
              <div style={{width:32,height:32,borderRadius:9,background:'rgba(14,165,233,.15)',color:'#0EA5E9',fontFamily:"'Syne',sans-serif",fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.88rem',flexShrink:0}}>{s.n}</div>
              <div>
                <div style={{color:'#fff',fontWeight:700,fontSize:'.88rem',marginBottom:4}}>{s.icon} {s.title}</div>
                <div style={{color:'#64748B',fontSize:'.78rem',lineHeight:1.55}}>{s.body}</div>
              </div>
            </div>
          ))}
          <div style={{background:'rgba(14,165,233,.1)',border:'1px solid rgba(14,165,233,.2)',borderRadius:13,padding:'13px 16px',marginTop:14}}>
            <div style={{color:'#38BDF8',fontWeight:700,fontSize:'.8rem',marginBottom:4}}>💡 Firebase gratuito incluye</div>
            <div style={{color:'#475569',fontSize:'.76rem',lineHeight:1.55}}>✓ Sincronización en tiempo real (&lt;1 segundo) &nbsp;·&nbsp; ✓ Funciona offline &nbsp;·&nbsp; ✓ Sin servidor propio &nbsp;·&nbsp; ✓ Gratis para uso familiar</div>
          </div>
        </div>
      </div>
    );
  }

  // ─── MAIN APP ─────────────────────────────────────────────────────────────
  function App() {
    const [tab, setTab]     = useState('inventario');
    const [items, setItems] = useState([]);
    const [online, setOnl]  = useState(true);
    const [syncing, setSyn] = useState(true);
    const [fCat, setFCat]   = useState('all');
    const [fSt,  setFSt]    = useState('all');
    const [form, setForm]   = useState({name:'',qty:'1',unit:'un',cat:'alimentos',status:'tengo'});
    const [editId, setEId]  = useState(null);
    const [tips, setTips]   = useState(false);
    const [toast, setToast] = useState(null);
    const tRef = useRef(null);

    const showToast = (msg, color='#16A34A') => {
      clearTimeout(tRef.current);
      setToast({msg,color});
      tRef.current = setTimeout(()=>setToast(null), 2500);
    };

    useEffect(() => {
      if (!DB_REF) return;
      const unsub = DB_REF.on('value', snap => {
        const d = snap.val();
        setItems(d ? Object.values(d).sort((a,b)=>(a.updatedAt||'').localeCompare(b.updatedAt||'')) : []);
        setSyn(false);
        setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),400);}},200);
      }, ()=>{ setSyn(false); setOnl(false); });
      const connRef = firebase.database().ref('.info/connected');
      connRef.on('value', s=>setOnl(!!s.val()));
      return () => { DB_REF.off('value',unsub); connRef.off(); };
    }, []);

    const save = item => { if(DB_REF){ setSyn(true); DB_REF.child(item.id).set(item); } };
    const del  = id   => { if(DB_REF){ setSyn(true); DB_REF.child(id).remove(); } };

    const submit = () => {
      if(!form.name.trim()) return;
      const item = {id:editId||uid(), name:form.name.trim(), qty:Number(form.qty)||1, unit:form.unit, cat:form.cat, status:form.status, updatedAt:new Date().toISOString()};
      save(item);
      setForm({name:'',qty:'1',unit:'un',cat:form.cat,status:'tengo'});
      setEId(null);
      showToast(editId?'✏️ Actualizado':'✅ Agregado');
    };

    const toggle = id => {
      const i = items.find(x=>x.id===id);
      if(i) save({...i, status:i.status==='tengo'?'comprar':'tengo', updatedAt:new Date().toISOString()});
    };
    const remove = id => { del(id); showToast('🗑️ Eliminado','#DC2626'); };
    const bought = id => {
      const i = items.find(x=>x.id===id);
      if(i) save({...i, status:'tengo', updatedAt:new Date().toISOString()});
      showToast('🛒 ¡Comprado!');
    };
    const startEdit = i => {
      setForm({name:i.name,qty:String(i.qty),unit:i.unit,cat:i.cat,status:i.status});
      setEId(i.id); setTab('inventario');
      window.scrollTo({top:0,behavior:'smooth'});
    };
    const shareList = () => {
      const text = '🏠 *Piedad 17*\n\n'+items.filter(i=>i.status==='comprar').map(i=>`• ${i.name} (${i.qty} ${i.unit})`).join('\n');
      if(navigator.share) navigator.share({title:'Piedad 17',text});
      else navigator.clipboard.writeText(text).then(()=>showToast('📋 Lista copiada'));
    };

    const tendo   = items.filter(i=>i.status==='tengo').length;
    const pend    = items.filter(i=>i.status==='comprar').length;
    const petPend = items.filter(i=>i.cat==='mascotas'&&i.status==='comprar').length;
    const shown   = items.filter(i=>(fCat==='all'||i.cat===fCat)&&(fSt==='all'||i.status===fSt));
    const shopByCat = CATS.map(c=>({...c,its:items.filter(i=>i.status==='comprar'&&i.cat===c.id)})).filter(c=>c.its.length);

    const B = (bg,fg='#fff') => ({padding:'9px 16px',borderRadius:10,border:'none',background:bg,color:fg,fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:'.86rem',cursor:'pointer',display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'});
    const IB = c => ({width:32,height:32,border:'none',borderRadius:8,background:`${c}18`,color:c,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0});
    const CHIP = (a,c,bg) => ({padding:'5px 12px',borderRadius:50,border:'none',background:a?bg:'#F1F5F9',color:a?c:'#94A3B8',fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:'.75rem',cursor:'pointer',whiteSpace:'nowrap',outline:a?`1.5px solid ${c}`:'none',outlineOffset:1});

    return (
      <div style={{fontFamily:"'DM Sans',sans-serif",minHeight:'100vh',background:'#F8FAFC'}}>

        {toast && <div style={{position:'fixed',top:14,left:'50%',transform:'translateX(-50%)',background:toast.color,color:'#fff',padding:'9px 20px',borderRadius:50,fontWeight:700,fontSize:'.82rem',zIndex:9999,boxShadow:'0 4px 20px rgba(0,0,0,0.18)',whiteSpace:'nowrap',animation:'fadeUp .2s ease',pointerEvents:'none'}}>{toast.msg}</div>}

        {/* HEADER */}
        <div style={{background:'#0F172A',padding:'max(env(safe-area-inset-top,0px),20px) 20px 22px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',width:200,height:200,borderRadius:'50%',background:'rgba(14,165,233,.07)',top:-80,right:-60,pointerEvents:'none'}}/>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:'clamp(1.4rem,5vw,1.9rem)',fontWeight:800,color:'#fff',letterSpacing:'-.5px'}}>
            Piedad <span style={{color:'#0EA5E9'}}>17</span>
          </div>
          <div style={{color:'#475569',fontSize:'.78rem',marginTop:3}}>Control de inventario del hogar</div>
          <div style={{display:'flex',gap:6,marginTop:12,flexWrap:'wrap'}}>
            {[
              ['#1E293B','#94A3B8',`📦 ${items.length} artículos`],
              ['rgba(22,163,74,.18)','#16A34A',`✅ ${tendo} en casa`],
              ['rgba(2,132,199,.18)','#0284C7',`🛒 ${pend} por comprar`],
              ...(petPend>0?[['rgba(192,38,211,.18)','#C026D3',`🐾 ${petPend}`]]:[]),
            ].map(([bg,c,label],i)=>(
              <div key={i} style={{background:bg,color:c,padding:'4px 11px',borderRadius:50,fontSize:'.73rem',fontWeight:700,display:'flex',alignItems:'center',gap:4}}>{label}</div>
            ))}
            <div style={{background:online?'rgba(22,163,74,.15)':'rgba(239,68,68,.15)',color:online?'#16A34A':'#EF4444',padding:'4px 11px',borderRadius:50,fontSize:'.73rem',fontWeight:700,display:'flex',alignItems:'center',gap:4}}>
              <span className={syncing?'syncing':''}>{online?'●':'○'}</span>
              {syncing?'Sincronizando…':online?'En línea':'Sin conexión'}
            </div>
          </div>
        </div>

        {/* NAV */}
        <div style={{background:'#fff',borderBottom:'1px solid #E2E8F0',display:'flex',position:'sticky',top:0,zIndex:100}}>
          {[
            {id:'inventario',label:'Inventario',ico:'home',badge:0},
            {id:'mascotas',  label:'Mascotas',  ico:'paw', badge:petPend},
            {id:'compras',   label:'Compras',   ico:'cart',badge:pend},
          ].map(({id,label,ico,badge})=>(
            <button key={id} onClick={()=>setTab(id)}
              style={{flex:1,padding:'13px 0',border:'none',background:'none',cursor:'pointer',fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:'.8rem',color:tab===id?'#0F172A':'#94A3B8',borderBottom:tab===id?'2px solid #0EA5E9':'2px solid transparent',display:'flex',alignItems:'center',justifyContent:'center',gap:5,transition:'all .2s'}}>
              <Ico n={ico} s={15}/>{label}
              {badge>0&&<span style={{background:id==='mascotas'?'#C026D3':'#0EA5E9',color:'#fff',borderRadius:50,minWidth:18,height:18,padding:'0 4px',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'.67rem',fontWeight:800}}>{badge}</span>}
            </button>
          ))}
        </div>

        <div style={{maxWidth:700,margin:'0 auto',padding:'16px 13px 80px'}}>

          {/* INVENTARIO */}
          {tab==='inventario' && (
            <div className="fade-in">
              <div style={{background:'#fff',borderRadius:16,padding:17,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #E2E8F0',marginBottom:14}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:'.9rem',color:'#0F172A',marginBottom:12,display:'flex',alignItems:'center',gap:7}}>
                  <Ico n={editId?'edit':'plus'} s={14}/>{editId?'Editar artículo':'Nuevo artículo'}
                </div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:7}}>
                  <input style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',flex:'2 1 150px'}} placeholder="Nombre (ej: Arroz, Jabón…)" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} onKeyDown={e=>e.key==='Enter'&&submit()}/>
                  <input style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',width:58}} type="number" min="0" step="0.1" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}/>
                  <select style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',cursor:'pointer'}} value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}>
                    {UNITS.map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  <select style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',cursor:'pointer',flex:'1 1 140px'}} value={form.cat} onChange={e=>setForm({...form,cat:e.target.value})}>
                    {CATS.map(c=><option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
                  </select>
                  <select style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',cursor:'pointer',flex:'1 1 130px'}} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                    <option value="tengo">✅ Lo tengo</option>
                    <option value="comprar">🛒 Por comprar</option>
                  </select>
                  <button className="main-btn" style={{...B('#0F172A'),flex:'0 0 auto'}} onClick={submit}>
                    <Ico n={editId?'check':'plus'} s={14}/>{editId?'Guardar':'Agregar'}
                  </button>
                  {editId&&<button style={B('#F1F5F9','#64748B')} onClick={()=>{setEId(null);setForm({name:'',qty:'1',unit:'un',cat:'alimentos',status:'tengo'})}}><Ico n="x" s={14}/></button>}
                </div>
              </div>

              <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,marginBottom:6,scrollbarWidth:'none'}}>
                {[{id:'all',l:'Todos',c:'#0F172A',b:'#F1F5F9'},{id:'tengo',l:'✅ Tengo',c:'#16A34A',b:'#DCFCE7'},{id:'comprar',l:'🛒 Comprar',c:'#0284C7',b:'#E0F2FE'}].map(f=>(
                  <button key={f.id} className="tag-btn" style={CHIP(fSt===f.id,f.c,f.b)} onClick={()=>setFSt(f.id)}>{f.l}</button>
                ))}
              </div>
              <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:4,marginBottom:6,scrollbarWidth:'none'}}>
                <button className="tag-btn" style={CHIP(fCat==='all','#475569','#F1F5F9')} onClick={()=>setFCat('all')}>Todas</button>
                {CATS.map(c=><button key={c.id} className="tag-btn" style={CHIP(fCat===c.id,c.color,c.light)} onClick={()=>setFCat(fCat===c.id?'all':c.id)}>{c.emoji} {c.label}</button>)}
              </div>

              <div style={{display:'flex',justifyContent:'space-between',fontSize:'.71rem',color:'#CBD5E1',margin:'4px 0 8px',paddingBottom:7,borderBottom:'1px solid #F1F5F9'}}>
                <span>{shown.length} artículo{shown.length!==1?'s':''} mostrado{shown.length!==1?'s':''}</span>
                <span className={syncing?'syncing':''} style={{color:online?'#22C55E':'#EF4444'}}>{syncing?'⟳ sincronizando':online?'● en línea':'○ sin conexión'}</span>
              </div>

              {shown.length===0 ? (
                <div style={{textAlign:'center',padding:'46px 20px',color:'#CBD5E1'}}>
                  <div style={{fontSize:'2.4rem',marginBottom:10}}>🗃️</div>
                  <div style={{fontWeight:700}}>Sin artículos</div>
                </div>
              ) : shown.map(item => {
                const c = cat(item.cat);
                return (
                  <div key={item.id} className="item-row" style={{background:'#fff',borderRadius:13,padding:'12px 13px',marginBottom:7,display:'flex',alignItems:'center',gap:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',border:'1px solid #F1F5F9',borderLeft:`3px solid ${item.status==='tengo'?'#16A34A':'#0EA5E9'}`}}>
                    <div style={{width:37,height:37,borderRadius:10,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem',flexShrink:0}}>{c.emoji}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:'.91rem',color:'#0F172A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {item.name}
                        <span style={{display:'inline-flex',alignItems:'center',padding:'1px 8px',borderRadius:50,background:c.light,color:c.color,fontSize:'.67rem',fontWeight:700,marginLeft:5,verticalAlign:'middle'}}>{c.label}</span>
                      </div>
                      <div style={{fontSize:'.73rem',color:'#94A3B8',marginTop:2}}>
                        {item.qty} {item.unit} · <span style={{color:item.status==='tengo'?'#16A34A':'#0284C7',fontWeight:600}}>{item.status==='tengo'?'En casa':'Por comprar'}</span>
                      </div>
                    </div>
                    <button className="icon-btn" style={IB(item.status==='tengo'?'#0284C7':'#16A34A')} onClick={()=>toggle(item.id)}>
                      {item.status==='tengo'?<Ico n="cart" s={14}/>:<Ico n="check" s={14}/>}
                    </button>
                    <button className="icon-btn" style={IB('#7C3AED')} onClick={()=>startEdit(item)}><Ico n="edit" s={14}/></button>
                    <button className="icon-btn" style={IB('#DC2626')} onClick={()=>remove(item.id)}><Ico n="trash" s={14}/></button>
                  </div>
                );
              })}
            </div>
          )}

          {/* MASCOTAS */}
          {tab==='mascotas' && (
            <div className="fade-in">
              <div style={{background:'linear-gradient(135deg,#FDF4FF,#F5F3FF)',borderRadius:16,padding:17,border:'1px solid #E9D5FF',marginBottom:14}}>
                <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:11}}>
                  <div style={{width:44,height:44,borderRadius:13,background:'#F3E8FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem'}}>🐾</div>
                  <div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:'1rem',color:'#581C87'}}>Inventario Mascotas</div>
                    <div style={{fontSize:'.74rem',color:'#A855F7',marginTop:2}}>Todo para tus compañeros</div>
                  </div>
                </div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  {[['#F3E8FF','#7C3AED',`📦 ${items.filter(i=>i.cat==='mascotas').length} total`],['#F0FDF4','#16A34A',`✅ ${items.filter(i=>i.cat==='mascotas'&&i.status==='tengo').length} disponibles`],['#EFF6FF','#1D4ED8',`🛒 ${petPend} por comprar`]].map(([bg,c,l],i)=>(
                    <div key={i} style={{background:bg,color:c,padding:'4px 11px',borderRadius:50,fontSize:'.73rem',fontWeight:700}}>{l}</div>
                  ))}
                </div>
              </div>

              <div style={{background:'#fff',borderRadius:16,padding:17,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #E2E8F0',marginBottom:14}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:'.9rem',color:'#0F172A',marginBottom:12,display:'flex',alignItems:'center',gap:7}}><Ico n="plus" s={14}/> Agregar para mascota</div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap',marginBottom:7}}>
                  <input style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',flex:'2 1 140px'}} placeholder="Ej: Alimento para perro" value={form.cat==='mascotas'?form.name:''} onChange={e=>setForm({...form,name:e.target.value,cat:'mascotas'})} onKeyDown={e=>{if(e.key==='Enter'){setForm(f=>({...f,cat:'mascotas'}));setTimeout(submit,0);}}}/>
                  <input style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',width:56}} type="number" min="0" step="0.1" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value,cat:'mascotas'})}/>
                  <select style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',cursor:'pointer'}} value={form.unit} onChange={e=>setForm({...form,unit:e.target.value})}>
                    {UNITS.map(u=><option key={u}>{u}</option>)}
                  </select>
                </div>
                <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                  <select style={{padding:'9px 12px',borderRadius:10,border:'1.5px solid #E2E8F0',fontFamily:"'DM Sans',sans-serif",fontSize:'.87rem',color:'#0F172A',background:'#fff',cursor:'pointer',flex:'1 1 130px'}} value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
                    <option value="tengo">✅ Lo tengo</option>
                    <option value="comprar">🛒 Por comprar</option>
                  </select>
                  <button className="main-btn" style={B('#C026D3')} onClick={()=>{setForm(f=>({...f,cat:'mascotas'}));setTimeout(submit,0);}}>
                    <Ico n="paw" s={14}/> Agregar
                  </button>
                </div>
                <button style={{background:'none',border:'none',cursor:'pointer',color:'#A855F7',fontSize:'.75rem',fontFamily:"'DM Sans',sans-serif",fontWeight:600,display:'flex',alignItems:'center',gap:4,marginTop:8}} onClick={()=>setTips(!tips)}>
                  💡 Sugerencias {tips?'▲':'▼'}
                </button>
                {tips&&<div style={{display:'flex',flexWrap:'wrap',gap:5,marginTop:8}}>
                  {PET_TIPS.map(s=><button key={s} className="tag-btn" style={{padding:'4px 10px',borderRadius:50,border:'1px solid #E9D5FF',background:'#FDF4FF',color:'#7C3AED',fontFamily:"'DM Sans',sans-serif",fontSize:'.73rem',fontWeight:600,cursor:'pointer'}} onClick={()=>setForm(f=>({...f,name:s,cat:'mascotas'}))}>{s}</button>)}
                </div>}
              </div>

              {items.filter(i=>i.cat==='mascotas').length===0 ? (
                <div style={{textAlign:'center',padding:'46px 20px',color:'#CBD5E1',background:'#fff',borderRadius:16,border:'1px solid #E2E8F0'}}>
                  <div style={{fontSize:'2.8rem',marginBottom:10}}>🐶🐱</div>
                  <div style={{fontWeight:700}}>Sin artículos de mascotas</div>
                </div>
              ) : items.filter(i=>i.cat==='mascotas').map(item=>(
                <div key={item.id} className="item-row" style={{background:'#fff',borderRadius:13,padding:'12px 13px',marginBottom:7,display:'flex',alignItems:'center',gap:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',border:'1px solid #F1F5F9',borderLeft:'3px solid #C026D3'}}>
                  <div style={{width:37,height:37,borderRadius:10,background:'#FDF4FF',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem',flexShrink:0}}>🐾</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'.91rem',color:'#0F172A'}}>{item.name}</div>
                    <div style={{fontSize:'.73rem',color:'#94A3B8',marginTop:2}}>{item.qty} {item.unit} · <span style={{color:item.status==='tengo'?'#16A34A':'#C026D3',fontWeight:600}}>{item.status==='tengo'?'Disponible':'Por comprar'}</span></div>
                  </div>
                  <button className="icon-btn" style={IB(item.status==='tengo'?'#C026D3':'#16A34A')} onClick={()=>toggle(item.id)}>{item.status==='tengo'?<Ico n="cart" s={14}/>:<Ico n="check" s={14}/>}</button>
                  <button className="icon-btn" style={IB('#7C3AED')} onClick={()=>startEdit(item)}><Ico n="edit" s={14}/></button>
                  <button className="icon-btn" style={IB('#DC2626')} onClick={()=>remove(item.id)}><Ico n="trash" s={14}/></button>
                </div>
              ))}
            </div>
          )}

          {/* COMPRAS */}
          {tab==='compras' && (
            <div className="fade-in">
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
                <div>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:'1.2rem',color:'#0F172A'}}>🛒 Lista de compras</div>
                  <div style={{fontSize:'.77rem',color:'#94A3B8',marginTop:2}}>{pend===0?'¡Todo en casa! 🎉':`${pend} artículo${pend!==1?'s':''} pendiente${pend!==1?'s':''}`}</div>
                </div>
                {pend>0&&<button className="main-btn" style={{...B('#0F172A'),padding:'7px 13px',fontSize:'.79rem'}} onClick={shareList}><Ico n="share" s={13}/> Compartir</button>}
              </div>

              {shopByCat.length===0 ? (
                <div style={{textAlign:'center',padding:'50px 20px',background:'#fff',borderRadius:16,border:'1px solid #E2E8F0'}}>
                  <div style={{fontSize:'3.5rem',marginBottom:12}}>🎉</div>
                  <div style={{fontWeight:700,fontSize:'1rem',color:'#475569'}}>¡Inventario completo!</div>
                  <div style={{fontSize:'.83rem',color:'#94A3B8',marginTop:6}}>No hay artículos pendientes</div>
                </div>
              ) : (
                <>
                  {shopByCat.map(c=>(
                    <div key={c.id} style={{background:'#fff',borderRadius:16,padding:16,boxShadow:'0 1px 4px rgba(0,0,0,0.06)',border:'1px solid #E2E8F0',marginBottom:12}}>
                      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12}}>
                        <div style={{width:35,height:35,borderRadius:9,background:c.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1rem'}}>{c.emoji}</div>
                        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:'.9rem',color:c.color,flex:1}}>{c.label}</div>
                        <span style={{display:'inline-flex',alignItems:'center',padding:'1px 8px',borderRadius:50,background:c.light,color:c.color,fontSize:'.67rem',fontWeight:700}}>{c.its.length}</span>
                      </div>
                      {c.its.map(item=>(
                        <div key={item.id} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 0',borderBottom:'1px solid #F8FAFC'}}>
                          <div style={{flex:1}}>
                            <span style={{fontWeight:600,color:'#0F172A',fontSize:'.87rem'}}>{item.name}</span>
                            <span style={{color:'#94A3B8',fontSize:'.75rem',marginLeft:7}}>{item.qty} {item.unit}</span>
                          </div>
                          <button className="main-btn" style={{...B('#16A34A'),padding:'6px 12px',fontSize:'.75rem'}} onClick={()=>bought(item.id)}>
                            <Ico n="check" s={13}/> Comprado
                          </button>
                        </div>
                      ))}
                    </div>
                  ))}
                  <div style={{background:'#0F172A',borderRadius:14,padding:'15px 18px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,color:'#fff',fontSize:'.9rem'}}>Total pendiente</div>
                      <div style={{fontSize:'.71rem',color:'#475569',marginTop:2}}>{shopByCat.length} categoría{shopByCat.length!==1?'s':''}</div>
                    </div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:'2rem',color:'#0EA5E9'}}>{pend}</div>
                  </div>
                </>
              )}
            </div>
          )}

        </div>
      </div>
    );
  }

  // MOUNT
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(IS_READY ? React.createElement(App) : React.createElement(Setup));
  if (!IS_READY) setTimeout(()=>{const s=document.getElementById('splash');if(s){s.classList.add('hide');setTimeout(()=>s.remove(),400);}},400);
</script>

<script>
  let deferredPrompt=null;
  const banner=document.getElementById('install-banner');
  window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;setTimeout(()=>banner.classList.add('show'),4000);});
  document.getElementById('install-btn').addEventListener('click',()=>{banner.classList.remove('show');if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}});
  document.getElementById('install-close').addEventListener('click',()=>{banner.classList.remove('show');});
  window.addEventListener('appinstalled',()=>banner.classList.remove('show'));
  if('serviceWorker'in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
</script>
</body>
</html>
